name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.tsx"
      - "src/**/*.ts"
      - "app/**/*.tsx"
      - "app/**/*.ts"
      - "components/**/*.tsx"
      - "components/**/*.ts"
      - "lib/**/*.ts"
      - "utils/**/*.ts"
      - "scripts/**/*.ts"
      - "**/*.md"
      - "wrangler.toml"
      - ".claude/skills/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Skip review for certain conditions
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]') &&
      !contains(github.event.pull_request.title, 'docs:') &&
      !contains(github.event.pull_request.title, 'chore:')
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Botトリガーを許可（ClaudeやGitHub Actionsなど）
          allowed_bots: "claude,claude[bot],github-actions[bot],dependabot[bot]"
          # Serena MCPサーバーの設定を明示的に指定
          mcp_config: |
            {
              "mcpServers": {
                "serena": {
                  "command": "uvx",
                  "args": ["--from", "git+https://github.com/oraios/serena", "serena-mcp-server"],
                  "env": {
                    "SERENA_PROJECT_PATH": "/home/runner/work/dti-affi/dti-affi"
                  }
                }
              }
            }

          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
          # model: "claude-opus-4-20250514"

          # レビュープロンプト（詳細観点は docs/claude/review-checklist.md を参照）
          direct_prompt: |
            このPRをレビューしてください。日本語で回答すること。

            事前準備:
            1. mcp__serena__onboarding でプロジェクト構造を理解
            2. docs/claude/review-checklist.md のレビュー観点に従って分析
            3. mcp__serena__search_for_pattern で変更の影響範囲を確認

            建設的で具体的なフィードバックを心がけ、個人開発プロジェクトであることを考慮してバランスの取れたレビューを行ってください。

          # Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          # コメントを上書きせず、新しいコメントとして投稿
          use_sticky_comment: false

          # Serena MCPとレビューに必要なツールを追加
          allowed_tools: "Bash(npm run lint),Bash(npm run build),Bash(npm run dev --dry-run),Bash(npm test),Bash(npm run test),mcp__github__comment__update_claude_comment,mcp__github__create_issue,mcp__github__update_issue,mcp__serena__onboarding,mcp__serena__find_file,mcp__serena__list_dir,mcp__serena__find_symbol,mcp__serena__search_for_pattern,mcp__serena__get_symbols_overview,mcp__serena__find_referencing_symbols,mcp__serena__write_memory,mcp__serena__read_memory,mcp__serena__list_memories,mcp__serena__delete_memory,mcp__serena__activate_project,mcp__serena__switch_modes,mcp__serena__get_current_config,mcp__serena__check_onboarding_performed,mcp__serena__think_about_collected_information,mcp__serena__think_about_task_adherence,mcp__serena__think_about_whether_you_are_done,mcp__serena__prepare_for_new_conversation"

